name: data-passing-demo

on:
  workflow_dispatch:

jobs:
  producer:
    runs-on: ubuntu-latest

    # Expose a value to OTHER jobs (small strings only)
    outputs:
      producer_job_time_stamp: ${{ steps.gen.outputs.generate_step_timestamp }}

    steps:
      - name: Generate timestamp — file + env var + step output
        id: gen
        run: |
          NOW="$(date --iso-8601=seconds)"

          # 1) file  -> survives between steps via the shared filesystem
          echo "$NOW" > timestamp.txt

          # 2) env var -> visible to LATER steps in THIS job
          echo "STAMP_ENV=$NOW" >> "$GITHUB_ENV"

          # 3) step output -> referenceable by step id, and promotable to a job output
          echo "generate_step_timestamp=$NOW" >> "$GITHUB_OUTPUT"

          echo "Generated: $NOW"

      - name: Read all three back in a LATER step
        run: |
          echo "From file:         $(cat timestamp.txt)"
          echo "From \$GITHUB_ENV:  $STAMP_ENV"
          echo "From step output:  ${{ steps.gen.outputs.generate_step_timestamp }}"

      - name: Upload the file as an artifact (the FILE path between jobs)
        uses: actions/upload-artifact@v7
        with:
          name: the-timestamp
          path: timestamp.txt

  consumer:
    runs-on: ubuntu-latest
    needs: producer
    steps:
      - name: Read the JOB OUTPUT (string — no download needed)
        run: |
            echo "Job output from producer: ${{ needs.producer.outputs.producer_job_time_stamp }}"

      - name: before downloading
        run: ls -al timestamp.txt || echo "File not found"

      - name: Download the artifact (the FILE)
        uses: actions/download-artifact@v8
        with:
          name: the-timestamp

      - name: Read the file produced by the other job
        run: cat timestamp.txt