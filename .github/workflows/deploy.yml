name: Deploy Blazor WASM to GitHub Pages

# Learning notes are inline so this file doubles as a reference.

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

# Permissions the GITHUB_TOKEN needs for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Change this if you rename the repo. It must match the repo name so the
  # app's <base href> resolves to https://<user>.github.io/<REPO_NAME>/
  REPO_NAME: mywasm

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify config present
        env:
          DEMO_VAR: ${{ vars.DEMO_VAR }}
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: dotnet test tests/mywasm.Tests/mywasm.Tests.csproj -c Release

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/mywasm/mywasm.csproj -c Release -o release

      # Ensure the _framework folder isn't dropped. (Belt-and-suspenders: the
      # Actions deploy path doesn't run Jekyll, but this keeps it safe either way.)
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

 # Rewrite <base href="/"> -> "/<repo>/" in the PUBLISHED index.html.
      # Source is never modified; this only touches the build output.
      # Replaces the unmaintained ghaction-rewrite-base-href (was Node 20).
      - name: Rewrite base href
        run: |
          grep -q '<base href="/" />' release/wwwroot/index.html || { echo "base href pattern not found — check index.html"; exit 1; }
          sed -i 's#<base href="/" />#<base href="/${{ env.REPO_NAME }}/" />#' release/wwwroot/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
